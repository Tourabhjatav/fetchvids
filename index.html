<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow" />
    <meta
      name="description"
      content="FetchVids helps you save public Instagram Reels, YouTube videos and Shorts, X/Twitter videos, and Facebook videos from a shared link when you have permission."
    />
    <meta name="application-name" content="FetchVids" />
    <meta name="theme-color" content="#075bea" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FetchVids" />
    <meta property="og:url" content="%FETCHVIDS_SITE_URL%" />
    <meta property="og:title" content="FetchVids — Free Social Video Downloader for Public Links" />
    <meta
      property="og:description"
      content="Paste a public social video URL and resolve an MP4 download link for content you own or have permission to save."
    />
    <meta property="og:image" content="/social-preview.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FetchVids — Free Social Video Downloader" />
    <meta
      name="twitter:description"
      content="Save public videos from Instagram, YouTube, X/Twitter, and Facebook using a shared link."
    />
    <meta name="twitter:image" content="/social-preview.svg" />
    <link rel="canonical" href="%FETCHVIDS_SITE_URL%" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <script type="application/ld+json" nonce="%CSP_NONCE%">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "FetchVids",
        "applicationCategory": "MultimediaApplication",
        "operatingSystem": "Any",
        "url": "%FETCHVIDS_SITE_URL%",
        "description": "FetchVids resolves public social video links into downloadable MP4 options for content users own or have permission to save.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
    <title>FetchVids — Free Social Video Downloader for Public Links</title>
  </head>
  <body>
    <div id="root">
      <main>
        <h1>FetchVids free social video downloader</h1>
        <p>
          Download public videos from Instagram, YouTube, X/Twitter, and Facebook by pasting a shared link.
          Only save content you own or have permission to use.
        </p>
      </main>
    </div>
    <noscript>
      <main>
        <h1>FetchVids requires JavaScript</h1>
        <p>Enable JavaScript to resolve public social video links.</p>
      </main>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
